<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>全能工具箱</title>
    <script type="text/javascript">
      var path = window.location.pathname;
      if (path.startsWith('/' + window.location.host.split('.')[0] + '/')) {
        path = path.substring('/' + window.location.host.split('.')[0].length);
      }
      window.location.replace('/' + path);
    </script>
  </head>
  <body></body>
</html>
