<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>全能工具箱 - 在线实用工具</title>
    <meta name="description" content="提供二维码生成、图片压缩、文本转换、开发调试等100+实用在线工具" />
    <script type="module">
      if (import.meta.hot?.on) {
        import.meta.hot.on('vite:error', (error) => {
          if (error.err) {
            console.error(
              [error.err.message, error.err.frame].filter(Boolean).join('\n'),
            )
          }
        })
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if (window.location.pathname !== '/' && !window.location.pathname.startsWith('/assets/')) {
        history.replaceState(null, null, '/');
      }
    </script>
  </body>
</html>
